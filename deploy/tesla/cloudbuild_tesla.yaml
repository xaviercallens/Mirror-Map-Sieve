# ─────────────────────────────────────────────────────────────
# cloudbuild_tesla.yaml — Build & Deploy Tesla Prototyping Pipeline
# Project: gen-lang-client-0625573011
# Region:  us-central1
# Service: tesla-prototyping-pipeline
# ─────────────────────────────────────────────────────────────

substitutions:
  _PROJECT_ID: gen-lang-client-0625573011
  _REGION: us-central1
  _SERVICE_NAME: tesla-prototyping-pipeline
  _IMAGE: us-central1-docker.pkg.dev/gen-lang-client-0625573011/cloud-run-source-deploy/tesla-prototyping-pipeline

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── Step 1: Build the Docker image ──────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_IMAGE}:${SHORT_SHA}
      - -t
      - ${_IMAGE}:latest
      - -f
      - deploy/tesla/Dockerfile.tesla
      - .
    dir: .

  # ── Step 2: Push the image to Artifact Registry ─────────────
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args:
      - push
      - ${_IMAGE}:${SHORT_SHA}
    waitFor:
      - build

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - ${_IMAGE}:latest
    waitFor:
      - build

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --project=${_PROJECT_ID}
      - --platform=managed
      - --memory=2Gi
      - --cpu=2
      - --timeout=3600s
      - --no-allow-unauthenticated
      - --set-secrets=GEMINI_API_KEY=gemini-api-key:latest,MISTRAL_API_KEY=mistral-api-key:latest
      - --min-instances=0
      - --max-instances=10
      - --concurrency=1
      - --execution-environment=gen2
    waitFor:
      - push-sha

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest

timeout: 1800s
