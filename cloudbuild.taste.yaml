steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.taste'
      - '-t'
      - 'gcr.io/$PROJECT_ID/taste-pipeline:latest'
      - '.'
    timeout: '900s'

  # 2. Push the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/taste-pipeline:latest'

  # 3. Deploy as a Cloud Run Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'taste-job'
      - '--image'
      - 'gcr.io/$PROJECT_ID/taste-pipeline:latest'
      - '--region'
      - 'europe-west1' # Default for Socrate
      - '--tasks'
      - '1'
      - '--max-retries'
      - '0'
      - '--task-timeout'
      - '3600s'

images:
  - 'gcr.io/$PROJECT_ID/taste-pipeline:latest'

timeout: '1800s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
