steps:
  # ── Build the runux pipeline image ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.runux_pipeline'
      - '-t'
      - 'gcr.io/$PROJECT_ID/runux-pipeline:latest'
      - '.'
    timeout: '1200s'

images:
  - 'gcr.io/$PROJECT_ID/runux-pipeline:latest'

timeout: '1500s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
