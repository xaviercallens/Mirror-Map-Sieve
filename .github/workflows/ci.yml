name: Mirror-Map-Sieve CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run Mathematical Test Suite
      run: |
        pytest tests/ -v --tb=short
        # Verifies:
        #   - S(n) exact values at n=0..10
        #   - Recurrence sum_{j=0}^5 P_j(n)*S(n+j)=0 for n=0..69
        #   - Mirror map q_d ∈ Z for d=1..16 (Lian-Yau integrality)
        #   - JSON polynomial data integrity

    - name: Run Geometry Verifier (independent check)
      run: |
        cd 3_mirror_map_geometry
        python verify_mirror_map.py 10

    - name: Run Polynomial Nullspace Solver (smoke test)
      run: |
        cd 1_algebraic_shielding_solvers
        # Quick smoke test: just verify the sequence computation (nullspace is slow)
        python -c "
        from math import comb
        S = lambda n: sum(comb(n,k)**4*comb(n+k,k) for k in range(n+1))
        ref = [1, 3, 55, 1155, 29751, 852753, 26097499, 840454275]
        assert [S(n) for n in range(8)] == ref, 'Sequence mismatch!'
        print('S(n) smoke test: PASS')
        "

  lean-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:v4.31.0
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Build Lean 4 Proofs
      run: |
        cd 2_lean4_formal_proofs
        lake exe cache get || true   # Pre-fetch Mathlib cache (best effort)
        lake build
        # Expected: 0 sorry, 0 axioms, 0 warnings on our code
