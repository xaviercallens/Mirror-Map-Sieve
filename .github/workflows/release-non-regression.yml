name: Release Non-Regression

on:
  release:
    types: [published]

jobs:
  non-regression:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,nvidia]
    - name: Run Non-Regression Stub Tests
      run: |
        pytest tests/test_non_regression_stubs.py -v
    - name: Static Anti-Stub Check
      run: |
        python tests/test_no_stubs.py
