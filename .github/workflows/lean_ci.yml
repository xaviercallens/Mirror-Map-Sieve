name: Lean CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean
        run: |
          curl -sSf https://leanprover.github.io/lean4_install.sh | sh
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Build Lean proofs
        run: |
          cd src/lean_proofs
          lake build
