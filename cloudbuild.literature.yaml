steps:
  # ── Build the literature pipeline image ────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.literature'
      - '-t'
      - 'gcr.io/$PROJECT_ID/literature-pipeline:latest'
      - '.'
    timeout: '900s'

images:
  - 'gcr.io/$PROJECT_ID/literature-pipeline:latest'

timeout: '1200s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
