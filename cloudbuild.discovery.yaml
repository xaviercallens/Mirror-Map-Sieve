steps:
  # ── Build the discovery image ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.discovery'
      - '-t'
      - 'gcr.io/$PROJECT_ID/discovery-pipeline:latest'
      - '.'
    timeout: '900s'

images:
  - 'gcr.io/$PROJECT_ID/discovery-pipeline:latest'

timeout: '1200s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

